<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFIMP Jam Dashboard</title>
    <!-- Use relative paths for GitHub Pages -->
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="setup-modal" class="modal">
        <div class="modal-content solid-card">
            <h2>Connect Spreadsheet</h2>
            <p>Enter your Google Sheet ID or link to load the jam session.</p>
            <input type="text" id="sheet-id-input" placeholder="e.g., 1k4K0GZV... or full URL">
            <button id="save-setup-btn" class="button-primary">Load Dashboard</button>
            <p id="setup-error" class="error-msg"></p>
        </div>
    </div>

    <header class="top-bar">
        <div class="logo-container">
            <!-- Emulating the clean text header of the official site -->
            <h2 class="brand-text">SAN FRANCISCO INDIAN MUSIC PROJECT</h2>
        </div>
        <div class="clock-container" style="display: flex; align-items: center;">
            <span id="current-time">--:-- -- PT</span>
            <button id="reset-sheet-btn" class="nav-btn button-secondary" title="Change Sheet" style="padding: 6px 12px; font-size: 0.8rem; margin-left: 16px;">
                Change Sheet
            </button>
        </div>
    </header>

    <main class="dashboard is-loading" id="main-dashboard">
        <!-- Main Current Song -->
        <div class="current-song-card solid-card card-accent">
            <div class="card-header">
                <span class="badge badge-orange">LIVE JAM</span>
                <span id="current-song-index" class="badge badge-light">#-</span>
            </div>
            
            <h1 id="current-song-title">Loading...</h1>
            <div class="song-meta">
                <span class="meta-icon">📍</span> <span id="current-time-block">--:-- PT</span>
            </div>
            
            <p class="section-label">Musicians</p>
            <div class="participants-grid" id="participants-list">
                <!-- Javascript will inject participants here -->
            </div>
        </div>

        <!-- Next Song Preview -->
        <div class="next-song-container">
            <div class="next-song-card solid-card">
                <h3>Next Up</h3>
                <p id="next-song-title">Loading...</p>
                <div id="next-song-participants" class="next-song-participants"></div>
            </div>
            
            <!-- Navigation Controls -->
            <div class="controls">
                <button id="prev-slot-btn" class="nav-btn button-secondary" title="Previous Slot">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
                </button>
                <button id="prev-btn" class="nav-btn button-secondary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                    Prev Song
                </button>
                <button id="next-btn" class="nav-btn button-primary">
                    Next Song
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <button id="next-slot-btn" class="nav-btn button-primary" title="Next Slot">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>
                </button>
            </div>
        </div>
    </main>
    <script src="./app.js"></script>
</body>
</html>
